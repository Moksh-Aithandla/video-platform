name: Build and Push Docker Images

on:
  push:
    branches:
      - vm

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Short Commit SHA
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Upload API Image
        run: |
          docker build \
            -t mokshaithandla/upload-api:latest \
            -t mokshaithandla/upload-api:$SHORT_SHA \
            ./services/upload-api

      - name: Push Upload API Image
        run: |
          docker push mokshaithandla/upload-api:latest
          docker push mokshaithandla/upload-api:$SHORT_SHA

      - name: Build Worker Image
        run: |
          docker build \
            -t mokshaithandla/worker:latest \
            -t mokshaithandla/worker:$SHORT_SHA \
            ./services/worker

      - name: Push Worker Image
        run: |
          docker push mokshaithandla/worker:latest
          docker push mokshaithandla/worker:$SHORT_SHA