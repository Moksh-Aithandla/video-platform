name: Build and Push Docker Images

on:
  push:
    branches:
      - vm

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Upload API Image
        run: |
          docker build -t mokshaithandla/upload-api:latest ./services/upload-api

      - name: Push Upload API Image
        run: |
          docker push mokshaithandla/upload-api:latest

      - name: Build Worker Image
        run: |
          docker build -t mokshaithandla/worker:latest ./services/worker

      - name: Push Worker Image
        run: |
          docker push mokshaithandla/worker:latest